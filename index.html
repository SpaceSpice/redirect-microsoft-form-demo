<script>
    const forms = [
        "https://office.com",
        "https://office.com",
        "https://office.com"
    ];

    // Anchor: A fixed starting point (use any past minute)
    const anchor = new Date("2024-01-01T00:00:00+08:00"); 

    function update() {
        // 1. Get current Hong Kong Time
        const hkNowStr = new Date().toLocaleString("en-US", {timeZone: "Asia/Hong_Kong"});
        const hkNow = new Date(hkNowStr);

        // 2. Calculate minutes passed since anchor
        const msInMinute = 60 * 1000;
        const minutesPassed = Math.floor((hkNow - anchor) / msInMinute);

        // 3. Demo Logic: 1 minute "Gap", 1 minute "Active"
        // (Even minutes = Active, Odd minutes = Gap)
        const isGapMinute = minutesPassed % 2 !== 0;

        if (isGapMinute) {
            document.getElementById('status').innerHTML = 
                "<b>DEMO MODE: Gap Period</b><br>The next form will rotate in less than 60 seconds.";
            
            const timeString = hkNow.toLocaleTimeString("en-HK", { hour12: true, hour: '2-digit', minute: '2-digit', second: '2-digit' });
            document.getElementById('hk-clock').innerHTML = "Current HK Time: " + timeString;
        } else {
            // 4. Rotation: Only increment the form index every 2 minutes (the full cycle)
            const cycleIndex = Math.floor(minutesPassed / 2);
            const target = forms[cycleIndex % forms.length];
            
            document.getElementById('status').innerHTML = "Redirecting to: " + target;
            // Delaying redirect by 2 seconds so you can actually see the message in the demo
            setTimeout(() => { window.location.replace(target); }, 2000);
        }
    }

    // Refresh every second so the demo clock stays live
    setInterval(update, 1000);
    update();
</script>
